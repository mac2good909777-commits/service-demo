<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 286" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif">
  <rect width="620" height="286" fill="#F2EFE8"/>
  <g stroke="#E2DED5" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/><line x1="240" y1="0" x2="240" y2="200"/><line x1="280" y1="0" x2="280" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/><line x1="360" y1="0" x2="360" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/><line x1="440" y1="0" x2="440" y2="200"/><line x1="480" y1="0" x2="480" y2="200"/><line x1="520" y1="0" x2="520" y2="200"/><line x1="560" y1="0" x2="560" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="0" y1="0" x2="620" y2="0"/><line x1="0" y1="40" x2="620" y2="40"/><line x1="0" y1="80" x2="620" y2="80"/><line x1="0" y1="120" x2="620" y2="120"/><line x1="0" y1="160" x2="620" y2="160"/>
  </g>
  <!-- 主要道路示意 -->
  <path d="M0 158 Q 200 148 320 164 T 620 158" fill="none" stroke="#D8CFA8" stroke-width="14" opacity="0.75"/>
  <path d="M40 18 L 80 178" stroke="#CFE0F0" stroke-width="10" opacity="0.7" fill="none"/>
  <text x="606" y="128" font-size="11" fill="#9a916f" text-anchor="end">主要道路 24米</text>
  <!-- 路徑連線 -->
  <line x1="140" y1="116" x2="500" y2="130" stroke="#C0A434" stroke-width="3" stroke-dasharray="7 5"/>
  <!-- 距離徽章 -->
  <g transform="translate(262,103)">
    <rect width="116" height="40" rx="6" fill="#2B5937"/>
    <text x="58" y="17" font-size="12.5" fill="#fff" text-anchor="middle" font-weight="700">約 3.5 公里</text>
    <text x="58" y="33" font-size="11.5" fill="#C0A434" text-anchor="middle">車程約 10 分鐘</text>
  </g>
  <!-- 現址標記 -->
  <g transform="translate(140,116)">
    <circle r="22" fill="#4B872F" stroke="#fff" stroke-width="3"/>
    <text y="5" font-size="14" fill="#fff" text-anchor="middle" font-weight="900">委託方</text>
    <rect x="-83" y="26" width="166" height="20" rx="4" fill="#2B5937"/>
    <text x="0" y="40" font-size="11" fill="#fff" text-anchor="middle">委託方現址（門牌略）</text>
  </g>
  <!-- 物件 -->
  <g transform="translate(500,130)">
    <path d="M0 8 C -14 -8 -14 -26 0 -26 C 14 -26 14 -8 0 8 Z" fill="#C0A434" stroke="#fff" stroke-width="2.5"/>
    <circle cx="0" cy="-17" r="6" fill="#fff"/>
    <rect x="-72" y="12" width="144" height="34" rx="4" fill="#fff" stroke="#C0A434"/>
    <text x="0" y="26" font-size="12" fill="#2B5937" text-anchor="middle" font-weight="700">③ 三重某乙工地</text>
    <text x="0" y="40" font-size="10.5" fill="#777" text-anchor="middle">（地段略）·主要道路</text>
  </g>
  <text x="14" y="20" font-size="12" fill="#2B5937" font-weight="700">位置關係示意圖</text>
  <!-- 交通圖例 -->
  <rect x="0" y="206" width="620" height="80" fill="#fff" stroke="#E2DED5"/>
  <text x="14" y="200" font-size="10.5" fill="#aaa">三重（地段略）一帶（非實際比例，距離為估算，導航以地圖連結為準）</text>
  <g transform="translate(22,222)">
      <circle cx="11" cy="11" r="10" fill="#2B5A8C"/>
      <text x="11" y="15" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">捷</text>
