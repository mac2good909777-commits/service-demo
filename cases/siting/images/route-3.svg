    </g><g transform="translate(218,222)">
      <circle cx="11" cy="11" r="10" fill="#D97706"/>
      <text x="11" y="15" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">快</text>
      <text x="27" y="10" font-size="11.5" fill="#333">台64線 三重端</text>
      <text x="27" y="24" font-size="12" fill="#D97706" font-weight="700">約 1.0 km</text>
    </g><g transform="translate(414,222)">
      <circle cx="11" cy="11" r="10" fill="#C0533A"/>
      <text x="11" y="15" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">國</text>
      <text x="27" y="10" font-size="11.5" fill="#333">國道1號 三重交流道</text>
      <text x="27" y="24" font-size="12" fill="#C0533A" font-weight="700">約 2.0 km</text>
    </g>
